name: CI-CD
# Deploy to AWS ECR testing

on:
  pull_request:
    types: [closed]

jobs:
  continuous-integration:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: config AWS credentials
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set default.region eu-north-1

      - name: login to ECR
        run: |
          aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin 487620625686.dkr.ecr.eu-north-1.amazonaws.com


      - name: Build and Push Docker image to ECR
        run: |
          docker build -t ec2-portfolio:${{ github.run_number }} .
          docker tag ec2-portfolio:${{ github.run_number }} 487620625686.dkr.ecr.eu-north-1.amazonaws.com/ec2-portfolio:${{ github.run_number }}
          docker push 487620625686.dkr.ecr.eu-north-1.amazonaws.com/ec2-portfolio:${{ github.run_number }}
  
  continuous-deployment:
    runs-on: ubuntu-latest
    needs: continuous-integration
    steps:
      - name: Check my ssh key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > mykey.pem
          chmod 400 mykey.pem

          ssh -o StrictHostKeyChecking=no -i mykey.pem ec2-user@13.48.42.102 "docker pull 487620625686.dkr.ecr.eu-north-1.amazonaws.com/ec2-portfolio:${{ github.run_number }}"


          ssh -o StrictHostKeyChecking=no -i mykey.pem ec2-user@13.48.42.102 "docker run -d -p 443:5000 487620625686.dkr.ecr.eu-north-1.amazonaws.com/ec2-portfolio:${{ github.run_number }}"

